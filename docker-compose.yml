version: '3.8'

services:
  # Servidor Web (Apache + PHP 8.3)
  web:
    build: .
    container_name: app_web
    user: "${UID}:${GID}"
    ports:
      - "8080:80"
    volumes:
      - ./src:/var/www/html
    environment:
      - DB_HOST=db
      - DB_NAME=meu_banco
      - DB_USER=usuario
      - DB_PASSWORD=senha_segura
    depends_on:
      - db

  # Banco de Dados (PostgreSQL)
  db:
    image: postgres:16-alpine
    container_name: app_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: meu_banco
      POSTGRES_USER: usuario
      POSTGRES_PASSWORD: senha_segura
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
